<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>tedge12 GitHub README Banner</title>
  <desc>Animated SVG banner blending vintage nautical aesthetics with futuristic circuit motifs, in black, white, aged gold, and sea blue.</desc>

  <defs>
    <style>
      @keyframes dash-flow { to { stroke-dashoffset: -40; } }
      @keyframes radar-sweep {
        from { transform: rotate(0deg); transform-origin: 540px 260px; }
        to   { transform: rotate(360deg); transform-origin: 540px 260px; }
      }
      @keyframes pulse-ring { 0% { opacity: 0.7; r: 0; } 100% { opacity: 0; r: 60; } }
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes flicker { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes blink-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.1; } }

      .sea-line { stroke-dasharray: 6 4; animation: dash-flow 3s linear infinite; }
      .circuit-line { stroke-dasharray: 4 6; animation: dash-flow 4s linear infinite; }
      .circuit-line-rev { stroke-dasharray: 4 6; animation: dash-flow 4s linear infinite reverse; }
      .radar-arm { animation: radar-sweep 5s linear infinite; }
      .pulse-ring { animation: pulse-ring 2.5s ease-out infinite; }
      .pulse-ring-delay { animation: pulse-ring 2.5s ease-out infinite 1.25s; }
      .title-text { animation: fade-in-up 1.2s ease-out both 0.3s; }
      .quote-text { animation: fade-in-up 1.2s ease-out both 0.6s; }
      .blink { animation: blink-dot 1.4s ease-in-out infinite; }
      .flicker { animation: flicker 3s ease-in-out infinite; }
    </style>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#b89a4a" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="680" height="340" fill="none"/>
  <rect x="0" y="0" width="680" height="340" fill="url(#hatch)"/>

  <!-- OCEAN WAVES -->
  <g opacity="0.18">
    <path d="M0 300 Q40 285 80 300 Q120 315 160 300 Q200 285 240 300" fill="none" stroke="#b89a4a" stroke-width="1.2" class="sea-line"/>
    <path d="M0 315 Q50 300 100 315 Q150 330 200 315 Q250 300 300 315" fill="none" stroke="#b89a4a" stroke-width="1" class="sea-line" style="animation-delay:-1s"/>
    <path d="M0 330 Q60 315 120 330 Q180 345 240 330" fill="none" stroke="#b89a4a" stroke-width="0.8" class="sea-line" style="animation-delay:-2s"/>
  </g>

  <!-- COMPASS ROSE -->
  <g opacity="0.85">
    <circle cx="130" cy="190" r="68" fill="none" stroke="#b89a4a" stroke-width="0.7" opacity="0.5"/>
    <circle cx="130" cy="190" r="55" fill="none" stroke="#b89a4a" stroke-width="0.4" opacity="0.35"/>
    <line x1="130" y1="122" x2="130" y2="258" stroke="#b89a4a" stroke-width="0.6" opacity="0.5"/>
    <line x1="62"  y1="190" x2="198" y2="190" stroke="#b89a4a" stroke-width="0.6" opacity="0.5"/>
    <line x1="82"  y1="142" x2="178" y2="238" stroke="#b89a4a" stroke-width="0.4" opacity="0.3"/>
    <line x1="178" y1="142" x2="82"  y2="238" stroke="#b89a4a" stroke-width="0.4" opacity="0.3"/>
    <polygon points="130,125 123,170 130,162 137,170" fill="#b89a4a" opacity="0.9"/>
    <polygon points="130,255 123,210 130,218 137,210" fill="none" stroke="#b89a4a" stroke-width="0.8" opacity="0.6"/>
    <polygon points="195,190 172,184 178,190 172,196" fill="#b89a4a" opacity="0.5"/>
    <polygon points="65,190 88,184 82,190 88,196" fill="#b89a4a" opacity="0.5"/>
    <circle cx="130" cy="190" r="4" fill="#b89a4a" opacity="0.9"/>
    <circle cx="130" cy="190" r="8" fill="none" stroke="#b89a4a" stroke-width="0.5" opacity="0.5"/>
    <text x="130" y="116" text-anchor="middle" font-size="11" font-family="Arial, sans-serif" font-weight="700" fill="#b89a4a" opacity="0.85" letter-spacing="1">N</text>
  </g>

  <!-- STAR CHART -->
  <g opacity="0.55">
    <circle cx="60"  cy="50"  r="1.5" fill="#b89a4a"/>
    <circle cx="95"  cy="35"  r="1"   fill="#b89a4a"/>
    <circle cx="140" cy="55"  r="1.8" fill="#b89a4a"/>
    <circle cx="175" cy="40"  r="1"   fill="#b89a4a"/>
    <circle cx="200" cy="65"  r="1.2" fill="#b89a4a"/>
    <circle cx="50"  cy="80"  r="1"   fill="#b89a4a"/>
    <circle cx="80"  cy="95"  r="1.5" fill="#b89a4a"/>
    <circle cx="115" cy="80"  r="1"   fill="#b89a4a"/>
    <circle cx="165" cy="90"  r="1"   fill="#b89a4a"/>
    <line x1="60"  y1="50"  x2="95"  y2="35"  stroke="#b89a4a" stroke-width="0.3" opacity="0.5"/>
    <line x1="95"  y1="35"  x2="140" y2="55"  stroke="#b89a4a" stroke-width="0.3" opacity="0.5"/>
    <line x1="140" y1="55"  x2="175" y2="40"  stroke="#b89a4a" stroke-width="0.3" opacity="0.4"/>
    <line x1="175" y1="40"  x2="200" y2="65"  stroke="#b89a4a" stroke-width="0.3" opacity="0.4"/>
    <line x1="60"  y1="50"  x2="50"  y2="80"  stroke="#b89a4a" stroke-width="0.3" opacity="0.4"/>
    <line x1="50"  y1="80"  x2="80"  y2="95"  stroke="#b89a4a" stroke-width="0.3" opacity="0.4"/>
    <line x1="80"  y1="95"  x2="115" y2="80"  stroke="#b89a4a" stroke-width="0.3" opacity="0.4"/>
    <line x1="115" y1="80"  x2="165" y2="90"  stroke="#b89a4a" stroke-width="0.3" opacity="0.3"/>
    <circle cx="140" cy="55" r="3" fill="none" stroke="#b89a4a" stroke-width="0.6" class="blink"/>
  </g>

  <!-- CIRCUIT LINES -->
  <g opacity="0.6">
    <line x1="420" y1="60"  x2="660" y2="60"  stroke="#1d7fa8" stroke-width="0.7" class="circuit-line"/>
    <line x1="420" y1="90"  x2="660" y2="90"  stroke="#1d7fa8" stroke-width="0.5" class="circuit-line-rev" style="animation-delay:-1s"/>
    <line x1="420" y1="120" x2="660" y2="120" stroke="#1d7fa8" stroke-width="0.7" class="circuit-line" style="animation-delay:-2s"/>
    <line x1="460" y1="60"  x2="460" y2="120" stroke="#1d7fa8" stroke-width="0.5" opacity="0.5"/>
    <line x1="520" y1="60"  x2="520" y2="120" stroke="#1d7fa8" stroke-width="0.5" opacity="0.5"/>
    <line x1="580" y1="60"  x2="580" y2="90"  stroke="#1d7fa8" stroke-width="0.5" opacity="0.5"/>
    <line x1="620" y1="90"  x2="620" y2="120" stroke="#1d7fa8" stroke-width="0.5" opacity="0.5"/>
    <circle cx="460" cy="60"  r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="460" cy="90"  r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="460" cy="120" r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="520" cy="60"  r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="520" cy="90"  r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="520" cy="120" r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="580" cy="60"  r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="580" cy="90"  r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="620" cy="90"  r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="620" cy="120" r="2.5" fill="#1d7fa8" opacity="0.8"/>
    <line x1="430" y1="290" x2="660" y2="290" stroke="#1d7fa8" stroke-width="0.6" class="circuit-line-rev" style="animation-delay:-0.5s"/>
    <line x1="430" y1="310" x2="660" y2="310" stroke="#1d7fa8" stroke-width="0.4" class="circuit-line" style="animation-delay:-1.5s"/>
    <line x1="470" y1="290" x2="470" y2="310" stroke="#1d7fa8" stroke-width="0.5" opacity="0.5"/>
    <line x1="530" y1="290" x2="530" y2="310" stroke="#1d7fa8" stroke-width="0.5" opacity="0.5"/>
    <line x1="590" y1="290" x2="590" y2="310" stroke="#1d7fa8" stroke-width="0.5" opacity="0.5"/>
    <circle cx="470" cy="290" r="2" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="530" cy="290" r="2" fill="#1d7fa8" opacity="0.8"/>
    <circle cx="590" cy="290" r="2" fill="#1d7fa8" opacity="0.8"/>
  </g>

  <!-- RADAR -->
  <g opacity="0.75">
    <circle cx="540" cy="260" r="60" fill="none" stroke="#1d7fa8" stroke-width="0.5" opacity="0.4"/>
    <circle cx="540" cy="260" r="40" fill="none" stroke="#1d7fa8" stroke-width="0.5" opacity="0.4"/>
    <circle cx="540" cy="260" r="20" fill="none" stroke="#1d7fa8" stroke-width="0.5" opacity="0.5"/>
    <line x1="540" y1="200" x2="540" y2="320" stroke="#1d7fa8" stroke-width="0.4" opacity="0.3"/>
    <line x1="480" y1="260" x2="600" y2="260" stroke="#1d7fa8" stroke-width="0.4" opacity="0.3"/>
    <circle cx="540" cy="260" r="10" fill="none" stroke="#1d7fa8" stroke-width="1" class="pulse-ring"/>
    <circle cx="540" cy="260" r="10" fill="none" stroke="#1d7fa8" stroke-width="0.6" class="pulse-ring-delay"/>
    <line x1="540" y1="260" x2="540" y2="200" stroke="#1d7fa8" stroke-width="1.2" class="radar-arm" opacity="0.7"/>
    <circle cx="562" cy="228" r="3" fill="#b89a4a" class="flicker"/>
    <circle cx="540" cy="260" r="3" fill="#1d7fa8" opacity="0.9"/>
  </g>

  <!-- DIVIDER -->
  <line x1="40" y1="148" x2="640" y2="148" stroke="#b89a4a" stroke-width="0.4" opacity="0.25"/>
  <line x1="40" y1="152" x2="640" y2="152" stroke="#b89a4a" stroke-width="0.8" opacity="0.15"/>

  <!-- TITLE -->
  <text class="title-text"
        x="340" y="195"
        text-anchor="middle"
        font-size="38"
        font-family="Arial, sans-serif"
        font-weight="700"
        letter-spacing="6"
        fill="#c8aa58"
        opacity="0.95">tedge12</text>

  <!-- Ornamental rules -->
  <line x1="210" y1="205" x2="268" y2="205" stroke="#b89a4a" stroke-width="0.6" opacity="0.5"/>
  <line x1="412" y1="205" x2="470" y2="205" stroke="#b89a4a" stroke-width="0.6" opacity="0.5"/>
  <polygon points="340,168 343,176 340,174 337,176" fill="#b89a4a" opacity="0.6"/>

  <!-- LATIN QUOTE -->
  <text class="quote-text"
        x="340" y="228"
        text-anchor="middle"
        font-size="11"
        font-family="Arial, sans-serif"
        font-style="italic"
        letter-spacing="1.5"
        fill="#1d7fa8"
        opacity="0.75">Navigare necesse est, vivere non est necesse.</text>

  <!-- Coordinates -->
  <text x="340" y="252"
        text-anchor="middle"
        font-size="9"
        font-family="Arial, sans-serif"
        letter-spacing="3"
        fill="#b89a4a"
        opacity="0.35">38°54′N · 77°02′W</text>
</svg>


