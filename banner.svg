    <rect x="752" y="175" width="20"  height="3"   fill="#ff8800" filter="url(#sg)" opacity=".75"/>                                                         
    <rect x="0" y="188" width="900" height="70" fill="url(#smog)"/>                                                                                         
    <line x1="0" y1="258" x2="900" y2="258" stroke="#ff8800" stroke-width="1.5" opacity=".5" filter="url(#sg)"/>                                            
    <line x1="0" y1="261" x2="900" y2="261" stroke="#cc3300" stroke-width="0.5" opacity=".35"/>                                                             
    <g>                                                                                                                                                     
      <circle r="1.5" fill="#ffcc44" filter="url(#sg)">                                                                                                     
        <animate attributeName="cx" from="-10" to="910" dur="18s" repeatCount="indefinite"/>                                                                
        <animate attributeName="cy" values="72;68;76;72" dur="18s" repeatCount="indefinite"/>                                                               
      </circle>                                                                                                                                             
      <circle r="1" fill="#ff4422" opacity=".8">                                                                                                            
        <animate attributeName="cx" from="-16" to="904" dur="18s" repeatCount="indefinite"/>                                                                
        <animate attributeName="cy" values="72;68;76;72" dur="18s" repeatCount="indefinite"/>
      </circle>                                                                                                                                             
    </g>                                                                                                                                                  
    <g>                                                                                                                                                     
      <circle r="1.5" fill="#aaccff" filter="url(#sg)">                                                                                                   
        <animate attributeName="cx" from="910" to="-10" dur="14s" begin="9s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="88;92;86;88" dur="14s" begin="9s" repeatCount="indefinite"/>                                                    
      </circle>
      <circle r="1" fill="#ff4422" opacity=".7">                                                                                                            
        <animate attributeName="cx" from="916" to="-4" dur="14s" begin="9s" repeatCount="indefinite"/>                                                    
        <animate attributeName="cy" values="88;92;86;88" dur="14s" begin="9s" repeatCount="indefinite"/>                                                    
      </circle>                                                                                                                                           
    </g>                                                                                                                                                    
    <g clip-path="url(#typer)">                                                                                                                           
      <text x="450" y="152"                                                                                                                                 
            text-anchor="middle"
            font-family="'Courier New', Courier, monospace"                                                                                                 
            font-size="38"                                                                                                                                
            letter-spacing="5"
            fill="#ffffff"
            filter="url(#neon)">HELLO, WELCOME</text>                                                                                                       
    </g>
    <rect x="643" y="122" width="3" height="33" fill="#ffffff" filter="url(#neon)" class="cursor"/>                                                         
  </svg>                                                    

