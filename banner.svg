<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">                                                             
    2   <defs>
    3     <style>
    4       .beacon  { animation: bp 2s ease-in-out infinite; }
    5       .beacon2 { animation: bp 2s ease-in-out infinite; animation-delay: 1s; }
    6       .beacon3 { animation: bp 2s ease-in-out infinite; animation-delay: .5s; }
    7       .cursor  { animation: cb .8s step-end infinite; animation-delay: 2.5s; opacity: 0; }
    8       @keyframes bp { 0%,100%{opacity:1} 50%{opacity:.06} }
    9       @keyframes cb { 0%,100%{opacity:1} 50%{opacity:0}   }
   10     </style>
   11
   12     <!-- Blade Runner sky: near-black top, warm amber at horizon -->
   13     <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
   14       <stop offset="0%"   stop-color="#04020a"/>
   15       <stop offset="55%"  stop-color="#1a0e08"/>
   16       <stop offset="100%" stop-color="#4a1c00"/>
   17     </linearGradient>
   18
   19     <!-- Smog / warm ground haze -->
   20     <linearGradient id="smog" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
   21       <stop offset="0%"   stop-color="#ff5500" stop-opacity="0"/>
   22       <stop offset="100%" stop-color="#ff6600" stop-opacity=".22"/>
   23     </linearGradient>
   24
   25     <!-- White text glow -->
   26     <filter id="neon" x="-30%" y="-80%" width="160%" height="260%">
   27       <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
   28       <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b2"/>
   29       <feMerge>
   30         <feMergeNode in="b2"/>
   31         <feMergeNode in="b1"/>
   32         <feMergeNode in="SourceGraphic"/>
   33       </feMerge>
   34     </filter>
   35
   36     <!-- Small glow for signs and beacons -->
   37     <filter id="sg" x="-150%" y="-150%" width="400%" height="400%">
   38       <feGaussianBlur stdDeviation="2" result="b"/>
   39       <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
   40     </filter>
   41
   42     <!-- Amber window pattern -->
   43     <pattern id="wA" x="2" y="2" width="14" height="12" patternUnits="userSpaceOnUse">
   44       <rect x="2" y="2" width="8" height="6" fill="#ffaa22"/>
   45     </pattern>
   46     <!-- Orange-red window pattern -->
   47     <pattern id="wR" x="2" y="2" width="14" height="12" patternUnits="userSpaceOnUse">
   48       <rect x="2" y="2" width="8" height="6" fill="#ff5511"/>
   49     </pattern>
   50     <!-- Rare cool-blue accent -->
   51     <pattern id="wB" x="2" y="2" width="14" height="12" patternUnits="userSpaceOnUse">
   52       <rect x="2" y="2" width="8" height="6" fill="#4499ff"/>
   53     </pattern>
   54
   55     <!-- Typewriter reveal clip -->
   56     <clipPath id="typer">
   57       <rect x="0" y="105" width="0" height="65">
   58         <animate attributeName="width" from="0" to="900" dur="2s" begin="0.8s" fill="freeze"/>
   59       </rect>
   60     </clipPath>
   61   </defs>
   62
   63   <!-- Sky -->
   64   <rect width="900" height="300" fill="url(#sky)"/>
   65
   66   <!-- Stars — few and dim, polluted sky -->
