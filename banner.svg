      <circle cx="810" cy="22" r="0.8"/><circle cx="870" cy="45" r="1.0"/>                                                                                
    </g>                                                                                                                                                    
    <g fill="#160b1a">                                                                                                                                    
      <rect x="0"   y="192" width="62"  height="66"/>
