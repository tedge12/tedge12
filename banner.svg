   68     <circle cx="35"  cy="12" r="0.8"/><circle cx="88"  cy="28" r="1.0"/>
   69     <circle cx="145" cy="8"  r="0.7"/><circle cx="220" cy="35" r="0.9"/>
   70     <circle cx="310" cy="18" r="0.8"/><circle cx="400" cy="42" r="0.7"/>
   71     <circle cx="480" cy="15" r="1.0"/><circle cx="565" cy="38" r="0.8"/>
