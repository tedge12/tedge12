  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
    <defs>
      <style>
        .beacon  { animation: beaconPulse 1.8s ease-in-out infinite; }
        .beacon2 { animation: beaconPulse 1.8s ease-in-out infinite; animation-delay: .9s; }
        .cursor  { animation: cursorBlink .75s step-end infinite; animation-delay: 2.4s; opacity: 0; }
        @keyframes beaconPulse { 0%,100%{opacity:1} 50%{opacity:.08} }
        @keyframes cursorBlink  { 0%,100%{opacity:1} 50%{opacity:0}   }
      </style>

      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#010110"/>
        <stop offset="75%"  stop-color="#0c0330"/>
        <stop offset="100%" stop-color="#180540"/>
      </linearGradient>
      <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#6600ff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#00aaff" stop-opacity=".22"/>
      </linearGradient>

      <filter id="neon" x="-30%" y="-80%" width="160%" height="260%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b2"/>
        <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="sg" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="1.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <pattern id="wY" x="2" y="2" width="14" height="12" patternUnits="userSpaceOnUse">
        <rect x="2" y="2" width="8" height="6" fill="#ffd060"/>
      </pattern>
      <pattern id="wC" x="2" y="2" width="14" height="12" patternUnits="userSpaceOnUse">
        <rect x="2" y="2" width="8" height="6" fill="#00d5f0"/>
      </pattern>

      <!-- Typewriter reveal: clips left→right over the text area -->
      <clipPath id="typer">
        <rect x="0" y="105" width="0" height="65">
          <animate attributeName="width" from="0" to="900" dur="2s" begin="0.8s" fill="freeze"/>
        </rect>
      </clipPath>
    </defs>

    <!-- Sky -->
    <rect width="900" height="300" fill="url(#sky)"/>

    <!-- Stars -->
    <g fill="#fff">
      <circle cx="22"  cy="14" r="1.0" opacity=".9"/><circle cx="68"  cy="28" r="1.3" opacity=".7"/>
      <circle cx="115" cy="10" r="0.8" opacity=".8"/><circle cx="162" cy="42" r="1.1" opacity=".6"/>
      <circle cx="210" cy="18" r="1.0" opacity=".9"/><circle cx="285" cy="35" r="0.9" opacity=".7"/>
      <circle cx="335" cy="14" r="1.2" opacity=".8"/><circle cx="390" cy="50" r="0.8" opacity=".5"/>
      <circle cx="448" cy="22" r="1.1" opacity=".9"/><circle cx="505" cy="38" r="1.0" opacity=".7"/>
      <circle cx="558" cy="11" r="0.9" opacity=".8"/><circle cx="615" cy="46" r="1.2" opacity=".6"/>
      <circle cx="665" cy="24" r="1.0" opacity=".8"/><circle cx="720" cy="40" r="1.3" opacity=".7"/>
      <circle cx="772" cy="16" r="0.8" opacity=".9"/><circle cx="828" cy="32" r="1.0" opacity=".6"/>
      <circle cx="872" cy="20" r="1.2" opacity=".8"/>
    </g>

    <!-- Horizon haze -->
    <rect x="0" y="195" width="900" height="63" fill="url(#haze)"/>

    <!-- Buildings -->
    <rect x="0"   y="218" width="52"  height="40"  fill="#06061c"/>
    <rect x="0"   y="218" width="52"  height="40"  fill="url(#wY)" opacity=".70"/>

    <rect x="55"  y="148" width="75"  height="110" fill="#05051a"/>
    <rect x="55"  y="148" width="75"  height="110" fill="url(#wY)" opacity=".60"/>
    <rect x="91"  y="132" width="2"   height="17"  fill="#1a1a33"/>
    <circle cx="92"  cy="131" r="2.5" fill="#ff2222" filter="url(#sg)" class="beacon"/>

    <rect x="133" y="175" width="55"  height="83"  fill="#070721"/>
    <rect x="133" y="175" width="55"  height="83"  fill="url(#wC)" opacity=".55"/>

    <rect x="191" y="132" width="65"  height="126" fill="#060619"/>
    <rect x="191" y="132" width="65"  height="126" fill="url(#wY)" opacity=".65"/>
    <rect x="222" y="115" width="2"   height="18"  fill="#1a1a33"/>
    <circle cx="223" cy="114" r="2"   fill="#ff2222" filter="url(#sg)" class="beacon2"/>

    <rect x="258" y="222" width="42"  height="36"  fill="#08082a"/>
    <rect x="258" y="222" width="42"  height="36"  fill="url(#wC)" opacity=".50"/>

    <!-- Low center silhouette -->
    <rect x="302" y="238" width="36" height="20" fill="#090928"/>
    <rect x="342" y="244" width="28" height="14" fill="#08082a"/>
    <rect x="374" y="232" width="44" height="26" fill="#07071f"/>
    <rect x="422" y="241" width="30" height="17" fill="#090928"/>
    <rect x="456" y="235" width="36" height="23" fill="#08082a"/>
    <rect x="496" y="242" width="28" height="16" fill="#090928"/>
    <rect x="528" y="236" width="40" height="22" fill="#07071f"/>
    <rect x="572" y="244" width="26" height="14" fill="#08082a"/>

    <rect x="600" y="222" width="42"  height="36"  fill="#08082a"/>
    <rect x="600" y="222" width="42"  height="36"  fill="url(#wC)" opacity=".50"/>

    <rect x="645" y="132" width="65"  height="126" fill="#060619"/>
    <rect x="645" y="132" width="65"  height="126" fill="url(#wY)" opacity=".65"/>
    <rect x="676" y="115" width="2"   height="18"  fill="#1a1a33"/>
    <circle cx="677" cy="114" r="2"   fill="#ff2222" filter="url(#sg)" class="beacon2"/>

    <rect x="713" y="175" width="55"  height="83"  fill="#070721"/>
    <rect x="713" y="175" width="55"  height="83"  fill="url(#wC)" opacity=".55"/>

    <rect x="771" y="148" width="75"  height="110" fill="#05051a"/>
    <rect x="771" y="148" width="75"  height="110" fill="url(#wY)" opacity=".60"/>
    <rect x="807" y="132" width="2"   height="17"  fill="#1a1a33"/>
    <circle cx="808" cy="131" r="2.5" fill="#ff2222" filter="url(#sg)" class="beacon"/>

    <rect x="849" y="218" width="51"  height="40"  fill="#06061c"/>
    <rect x="849" y="218" width="51"  height="40"  fill="url(#wY)" opacity=".70"/>

    <!-- Ground neon lines -->
    <line x1="0" y1="258" x2="900" y2="258" stroke="#00e5ff" stroke-width="1.5" opacity=".40" filter="url(#sg)"/>
    <line x1="0" y1="261" x2="900" y2="261" stroke="#9900ff" stroke-width="0.5" opacity=".30"/>

    <!-- Typewriter text -->
    <g clip-path="url(#typer)">
      <text x="450" y="152"
            text-anchor="middle"
            font-family="'Courier New', Courier, monospace"
            font-size="38"
            letter-spacing="5"
            fill="#00e5ff"
            filter="url(#neon)">HELLO, WELCOME</text>
    </g>

    <!-- Blinking cursor (appears after typing finishes) -->
    <rect x="643" y="122" width="3" height="33" fill="#00e5ff" filter="url(#neon)" class="cursor"/>
  </svg>
