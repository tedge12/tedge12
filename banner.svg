      <rect x="808" y="172" width="55"  height="86"/>
      <rect x="866" y="192" width="34"  height="66"/>                                                                                                       
    </g>
    <g fill="#080510">                                                                                                                                      
      <rect x="0"   y="165" width="50"  height="93"/>                                                                                                       
      <rect x="53"  y="142" width="68"  height="116"/>
      <rect x="124" y="155" width="55"  height="103"/>                                                                                                      
      <rect x="182" y="122" width="70"  height="136"/>                                                                                                    
      <rect x="255" y="166" width="48"  height="92"/>                                                                                                       
      <rect x="306" y="202" width="40"  height="56"/>                                                                                                     
      <rect x="554" y="202" width="40"  height="56"/>                                                                                                       
      <rect x="597" y="166" width="48"  height="92"/>                                                                                                     
      <rect x="648" y="122" width="70"  height="136"/>
      <rect x="721" y="155" width="55"  height="103"/>                                                                                                      
      <rect x="779" y="142" width="68"  height="116"/>
      <rect x="850" y="165" width="50"  height="93"/>                                                                                                       
    </g>                                                                                                                                                  
    <rect x="53"  y="142" width="68"  height="116" fill="url(#wA)" opacity=".58"/>                                                                          
    <rect x="182" y="122" width="70"  height="136" fill="url(#wA)" opacity=".62"/>                                                                          
    <rect x="124" y="155" width="55"  height="103" fill="url(#wR)" opacity=".42"/>                                                                          
    <rect x="648" y="122" width="70"  height="136" fill="url(#wA)" opacity=".62"/>                                                                          
    <rect x="721" y="155" width="55"  height="103" fill="url(#wR)" opacity=".42"/>                                                                          
    <rect x="779" y="142" width="68"  height="116" fill="url(#wA)" opacity=".58"/>                                                                          
    <rect x="255" y="166" width="48"  height="92"  fill="url(#wB)" opacity=".22"/>                                                                        
    <rect x="597" y="166" width="48"  height="92"  fill="url(#wB)" opacity=".22"/>                                                                          
    <rect x="215" y="104" width="2"   height="20"  fill="#2a1010"/>                                                                                       
    <circle cx="216" cy="103" r="2.5" fill="#ff3300" filter="url(#sg)" class="beacon"/>                                                                     
    <rect x="683" y="104" width="2"   height="20"  fill="#2a1010"/>                                                                                         
    <circle cx="684" cy="103" r="2.5" fill="#ff3300" filter="url(#sg)" class="beacon2"/>                                                                    
    <rect x="87"  y="125" width="2"   height="18"  fill="#1a0e0e"/>                                                                                         
    <circle cx="88"  cy="124" r="2"   fill="#ff5500" filter="url(#sg)" class="beacon3"/>                                                                    
    <rect x="813" y="125" width="2"   height="18"  fill="#1a0e0e"/>                                                                                         
    <circle cx="814" cy="124" r="2"   fill="#ff5500" filter="url(#sg)" class="beacon"/>                                                                     
    <rect x="58"  y="183" width="32"  height="4"   fill="#ff4400" filter="url(#sg)" opacity=".9"/>                                                          
    <rect x="58"  y="190" width="22"  height="3"   fill="#ffbb00" filter="url(#sg)" opacity=".85"/>                                                         
    <rect x="812" y="183" width="32"  height="4"   fill="#ff4400" filter="url(#sg)" opacity=".9"/>                                                          
    <rect x="812" y="190" width="22"  height="3"   fill="#ffbb00" filter="url(#sg)" opacity=".85"/>                                                         
    <rect x="187" y="156" width="28"  height="3"   fill="#ff0055" filter="url(#sg)" opacity=".88"/>                                                         
