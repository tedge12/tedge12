 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">                                                                   
    <defs>                                                                                                                                                  
      <style>                                                                                                                                               
        .beacon  { animation: bp 2s ease-in-out infinite; }                                                                                                 
        .beacon2 { animation: bp 2s ease-in-out infinite; animation-delay: 1s; }                                                                          
        .beacon3 { animation: bp 2s ease-in-out infinite; animation-delay: .5s; }                                                                           
        .cursor  { animation: cb .8s step-end infinite; animation-delay: 2.5s; opacity: 0; }                                                              
        @keyframes bp { 0%,100%{opacity:1} 50%{opacity:.06} }                                                                                               
        @keyframes cb { 0%,100%{opacity:1} 50%{opacity:0}   }                                                                                               
      </style>                                                                                                                                              
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">                                                               
        <stop offset="0%"   stop-color="#04020a"/>                                                                                                          
        <stop offset="55%"  stop-color="#1a0e08"/>                                                                                                          
        <stop offset="100%" stop-color="#4a1c00"/>                                                                                                          
      </linearGradient>                                                                                                                                     
      <linearGradient id="smog" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">                                                              
        <stop offset="0%"   stop-color="#ff5500" stop-opacity="0"/>                                                                                         
        <stop offset="100%" stop-color="#ff6600" stop-opacity=".22"/>
      </linearGradient>                                                                                                                                     
      <filter id="neon" x="-30%" y="-80%" width="160%" height="260%">                                                                                       
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b2"/>                                                                                   
        <feMerge>                                                                                                                                           
          <feMergeNode in="b2"/>                                                                                                                            
          <feMergeNode in="b1"/>                                                                                                                            
          <feMergeNode in="SourceGraphic"/>                                                                                                               
        </feMerge>
      </filter>                                                                                                                                             
      <filter id="sg" x="-150%" y="-150%" width="400%" height="400%">
        <feGaussianBlur stdDeviation="2" result="b"/>                                                                                                       
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>                                                                           
      </filter>
      <pattern id="wA" x="2" y="2" width="14" height="12" patternUnits="userSpaceOnUse">                                                                    
        <rect x="2" y="2" width="8" height="6" fill="#ffaa22"/>                                                                                             
      </pattern>                                                                                                                                            
      <pattern id="wR" x="2" y="2" width="14" height="12" patternUnits="userSpaceOnUse">                                                                    
        <rect x="2" y="2" width="8" height="6" fill="#ff5511"/>                                                                                             
      </pattern>                                                                                                                                          
      <pattern id="wB" x="2" y="2" width="14" height="12" patternUnits="userSpaceOnUse">                                                                    
        <rect x="2" y="2" width="8" height="6" fill="#4499ff"/>                                                                                             
      </pattern>                                                                                                                                            
      <clipPath id="typer">                                                                                                                                 
        <rect x="0" y="105" width="0" height="65">                                                                                                          
          <animate attributeName="width" from="0" to="900" dur="2s" begin="0.8s" fill="freeze"/>                                                            
        </rect>                                                                                                                                             
      </clipPath>                                                                                                                                           
    </defs>                                                                                                                                                 
    <rect width="900" height="300" fill="url(#sky)"/>                                                                                                     
    <g fill="#fff" opacity=".35">                                                                                                                           
      <circle cx="35"  cy="12" r="0.8"/><circle cx="88"  cy="28" r="1.0"/>
      <circle cx="145" cy="8"  r="0.7"/><circle cx="220" cy="35" r="0.9"/>                                                                                  
      <circle cx="310" cy="18" r="0.8"/><circle cx="400" cy="42" r="0.7"/>                                                                                  
